name: Test ai-gateway money guards

on:
  pull_request:
    paths:
      - "packages/ai-gateway/**"
      - ".github/workflows/test-ai-gateway.yml"
      - ".github/workflows/deploy-ai-gateway.yml"
  push:
    branches: [main]
    paths:
      - "packages/ai-gateway/**"
      - ".github/workflows/test-ai-gateway.yml"
      - ".github/workflows/deploy-ai-gateway.yml"

permissions:
  contents: read

jobs:
  money-guards:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Test hosted-AI money guards
        run: bun run test:money-guards

      - name: Verify Worker bundle
        run: bunx wrangler deploy --dry-run --outdir /tmp/ai-gateway-dry-run
